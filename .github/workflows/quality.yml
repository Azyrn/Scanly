name: Quality Gate

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Static Analysis (Detekt)
    runs-on: ubuntu-latest
    # The repo's default token is read-only, and a push event — unlike a pull_request one — is
    # not granted this implicitly, so the SARIF upload was failing main on every merge while
    # Detekt itself passed.
    permissions:
      contents: read
      security-events: write
    env:
      DETEKT_VERSION: 1.23.8
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Detekt
        run: |
          BASE="https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}"
          curl -sSfL -o detekt-cli.jar "$BASE/detekt-cli-${DETEKT_VERSION}-all.jar"
          curl -sSfL -o detekt-formatting.jar "$BASE/detekt-formatting-${DETEKT_VERSION}.jar"

      - name: Run Detekt
        run: |
          java -jar detekt-cli.jar \
            --config detekt.yml \
            --build-upon-default-config \
            --plugins detekt-formatting.jar \
            --baseline detekt-baseline.xml \
            --input app/src/main/java \
            --report sarif:results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif

  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Android Lint
        run: ./gradlew lint --no-daemon
      
      - name: Upload Lint Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    # A style finding must not prevent the APK from being built, but a failing unit test should.
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=" >> local.properties
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
