name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (blank = latest semver tag)'
        required: false
        type: string
      dry_run:
        description: 'Publish as a draft release instead of a public one'
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Tag pushes must always publish for real; only a manual dispatch can be a dry run.
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: tag
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" == "tag" ]]; then
            TAG="$REF_NAME"
          elif [[ -n "$INPUT_TAG" ]]; then
            TAG="$INPUT_TAG"
          else
            # Sorted on the version with any 'v' stripped, so a mix of '3.3.2' and
            # 'v3.4.0' tags still orders numerically rather than by prefix.
            TAG="$(git tag --list \
              | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
              | sed -E 's/^(v?)(.+)$/\2\t\1\2/' \
              | sort -k1,1Vr \
              | head -n 1 \
              | cut -f2)"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Unable to resolve a release tag." >&2
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Resolved tag '$TAG' does not exist in this repository." >&2
            exit 1
          fi

          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check out tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git checkout --force --detach "refs/tags/$TAG"
          echo "Tag: $(git describe --tags --exact-match)"
          echo "Commit: $(git rev-parse HEAD)"

      # action-gh-release updates an existing release by tag, so a dry run against a published tag would overwrite it.
      - name: Guard dry run
        if: env.DRY_RUN == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [[ "$IS_DRAFT" != "true" ]]; then
              printf "Dry run refused for tag '%s': a dry run will not modify a published release; pass a tag that has no published release.\n" "$TAG" >&2
              exit 1
            fi
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore and write local.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          set -euo pipefail
          # The keystore must exist before Gradle configuration so the release certificate pin is embedded.
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          if [[ ! -s "$RUNNER_TEMP/release.jks" ]]; then
            echo "Decoded keystore is empty." >&2
            exit 1
          fi

          {
            printf 'storeFile=%s\n' "$RUNNER_TEMP/release.jks"
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'ADMOB_APP_ID=%s\n' "$ADMOB_APP_ID"
            printf 'ADMOB_REWARDED_AD_UNIT_ID=%s\n' "$ADMOB_REWARDED_AD_UNIT_ID"
            printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER_API_KEY"
            printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY"
            printf 'MISTRAL_API_KEY=%s\n' "$MISTRAL_API_KEY"
            printf 'HUGGINGFACE_API_KEY=%s\n' "$HUGGINGFACE_API_KEY"
            printf 'NVIDIA_API_KEY=%s\n' "$NVIDIA_API_KEY"
            printf 'CLOUDFLARE_API_KEY=%s\n' "$CLOUDFLARE_API_KEY"
            printf 'CLOUDFLARE_ACCOUNT_ID=%s\n' "$CLOUDFLARE_ACCOUNT_ID"
            printf 'GROQ_API_KEY=%s\n' "$GROQ_API_KEY"
            printf 'CEREBRAS_API_KEY=%s\n' "$CEREBRAS_API_KEY"
          } > local.properties

      - name: Build Release APKs
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx5g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
        run: |
          set -euo pipefail
          # Build only the arm64-v8a APK.
          ./gradlew :app:assembleRelease -PreleaseAbi=arm64-v8a --max-workers=4 --stacktrace

      - name: Verify APK signatures
        run: |
          set -euo pipefail
          APK_DIR="app/build/outputs/apk/release"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -mindepth 2 -maxdepth 2 -type f -name apksigner -print | sort -V | tail -n 1)"
          if [[ -z "$APKSIGNER" ]]; then
            echo "Unable to locate apksigner under $ANDROID_HOME/build-tools." >&2
            exit 1
          fi

          shopt -s nullglob
          for ABI in arm64-v8a; do
            MATCHES=("$APK_DIR"/*"$ABI"*.apk)
            if (( ${#MATCHES[@]} != 1 )); then
              echo "Expected exactly one $ABI release APK, found ${#MATCHES[@]}." >&2
              exit 1
            fi
          done

          APKS=("$APK_DIR"/*.apk)
          if (( ${#APKS[@]} == 0 )); then
            echo "No release APKs were produced." >&2
            exit 1
          fi
          for APK in "${APKS[@]}"; do
            "$APKSIGNER" verify --print-certs "$APK"
          done

      - name: Prepare release artifacts
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          APK_DIR="app/build/outputs/apk/release"
          mkdir -p release-artifacts
          shopt -s nullglob

          for ABI in arm64-v8a; do
            MATCHES=("$APK_DIR"/*"$ABI"*.apk)
            if (( ${#MATCHES[@]} != 1 )); then
              echo "Expected exactly one $ABI release APK, found ${#MATCHES[@]}." >&2
              exit 1
            fi
            cp "${MATCHES[0]}" "release-artifacts/Scanly-$VERSION-$ABI.apk"
          done

      - name: Extract changelog notes
        id: notes
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          NOTES="$RUNNER_TEMP/release-notes.md"
          : > "$NOTES"
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              $0 ~ ("^## \\[" ver "\\]") { capture = 1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "$NOTES"
          fi
          if grep -q '[^[:space:]]' "$NOTES"; then
            { printf 'found=true\n'; printf 'path=%s\n' "$NOTES"; } >> "$GITHUB_OUTPUT"
          else
            printf 'found=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Scanly-${{ steps.tag.outputs.version }}
          path: release-artifacts/
          retention-days: 14

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Scanly ${{ steps.tag.outputs.version }}
          files: release-artifacts/*
          draft: ${{ env.DRY_RUN == 'true' }}
          prerelease: false
          fail_on_unmatched_files: true
          # Use the curated CHANGELOG section as the release body, and fall back to auto-generated notes only when the version has no section.
          body_path: ${{ steps.notes.outputs.found == 'true' && steps.notes.outputs.path || '' }}
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
